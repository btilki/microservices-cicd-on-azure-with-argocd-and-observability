apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-stage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/microservices-azure.git
    targetRevision: main
    path: gitops/apps/stage
    directory:
      recurse: true
      include: "*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
