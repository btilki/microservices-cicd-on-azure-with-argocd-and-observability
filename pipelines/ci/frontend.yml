trigger:
  branches:
    include:
      - main
  paths:
    include:
      - apps/frontend/*
      - charts/frontend/*
      - pipelines/ci/frontend.yml

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  SERVICE_NAME: frontend
  DEV_ACR_NAME: btilkiazuredevacr
  DEV_ACR_LOGIN_SERVER: btilkiazuredevacr.azurecr.io
  IMAGE_REPOSITORY: frontend
  GITOPS_VALUES_FILE: gitops/envs/dev/values-frontend.yaml

stages:
  - stage: BuildScanPush
    displayName: Build, scan, and push image
    jobs:
      - job: BuildAndPush
        steps:
          - checkout: self
            persistCredentials: true

          - script: |
              set -euo pipefail
              echo "Add frontend lint/test commands for your stack here."
            displayName: Run lint/tests (placeholder)

          - task: Docker@2
            displayName: Build and push image
            inputs:
              containerRegistry: dev-acr-service-connection
              repository: $(IMAGE_REPOSITORY)
              command: buildAndPush
              Dockerfile: apps/frontend/Dockerfile
              buildContext: .
              tags: |
                $(Build.SourceVersion)

          - script: |
              set -euo pipefail
              IMAGE_REF="$(DEV_ACR_LOGIN_SERVER)/$(IMAGE_REPOSITORY):$(Build.SourceVersion)"
              DIGEST="$(az acr repository show-manifests --name $(DEV_ACR_NAME) --repository $(IMAGE_REPOSITORY) --query "[?contains(tags, '$(Build.SourceVersion)')].digest | [0]" -o tsv)"
              if [ -z "$DIGEST" ]; then
                echo "Digest not found for $IMAGE_REF"
                exit 1
              fi
              echo "Resolved digest: $DIGEST"
              echo "##vso[task.setvariable variable=IMAGE_DIGEST;isOutput=true]$DIGEST"
            displayName: Resolve pushed image digest
            name: ResolveDigest

          - script: |
              set -euo pipefail
              python3 - <<'PY'
              from pathlib import Path
              path = Path("$(GITOPS_VALUES_FILE)")
              content = path.read_text()
              old = "sha256:replace-with-ci-produced-digest"
              new = "$(ResolveDigest.IMAGE_DIGEST)"
              if old in content:
                  path.write_text(content.replace(old, new))
              else:
                  import re
                  path.write_text(re.sub(r'digest:\s*\"?sha256:[a-zA-Z0-9]+\"?', f'digest: "{new}"', content))
              print(f"Updated {path} with digest {new}")
              PY
            displayName: Update GitOps values digest

          - script: |
              set -euo pipefail
              git config user.email "buildagent@local"
              git config user.name "buildagent"
              BRANCH="ci/frontend-digest-$(Build.BuildId)"
              git checkout -b "$BRANCH"
              git add $(GITOPS_VALUES_FILE)
              git commit -m "chore(frontend): update dev image digest"
              echo "TODO: push branch and open PR (Azure Repos REST API or GitHub CLI)."
              echo "Branch prepared: $BRANCH"
            displayName: Prepare GitOps PR branch (placeholder)
